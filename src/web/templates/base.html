<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}RateApp Moderation{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f4f4; color: #222; }
    nav { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; gap: 20px; align-items: center; }
    nav a { color: #a0c4ff; text-decoration: none; font-weight: 500; }
    nav a:hover { color: #fff; }
    nav .spacer { flex: 1; }
    nav .user { font-size: 0.85rem; opacity: 0.7; }
    .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }
    h1 { font-size: 1.6rem; margin-bottom: 20px; }
    h2 { font-size: 1.2rem; margin-bottom: 12px; }
    .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f0f0f0; font-weight: 600; }
    tr:hover td { background: #fafafa; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.78rem; font-weight: 600; }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-resolved { background: #d1e7dd; color: #0f5132; }
    .badge-rejected { background: #f8d7da; color: #842029; }
    .badge-active { background: #d1e7dd; color: #0f5132; }
    .badge-hidden { background: #fff3cd; color: #856404; }
    .badge-deleted { background: #f8d7da; color: #842029; }
    .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; text-decoration: none; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-warning { background: #ffc107; color: #000; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .btn-success { background: #198754; color: #fff; }
    .btn:hover { opacity: 0.85; }
    form { display: inline; }
    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; }
    .alert-success { background: #d1e7dd; color: #0f5132; }
    .alert-error { background: #f8d7da; color: #842029; }
    .content-preview { background: #f8f9fa; border-radius: 4px; padding: 10px; font-size: 0.9rem; word-break: break-all; }
    .meta { font-size: 0.8rem; color: #666; margin-top: 4px; }
  </style>
</head>
<body>
  <nav>
    <a href="/">RateApp Mod</a>
    <a href="/reports">Zhalaby</a>
    <a href="/audit">Audit log</a>
    <span class="spacer"></span>
    {% if moderator %}
      <span class="user">User: {{ moderator }}</span>
      <a href="/logout">Logout</a>
    {% endif %}
  </nav>
  <div class="container">
    {% if flash %}
      <div class="alert alert-{{ flash.type }}">{{ flash.message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
